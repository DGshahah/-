}
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Status Demo</title>
<link rel="stylesheet" href="style.css"/>
<link rel="manifest" href="manifest.json"/>
</head>
<body>

<header class="top">
  <button id="menuBtn">☰</button>
  <div class="title">Status (Demo)</div>
  <div class="bell">🔔</div>
</header>

<aside id="drawer" class="drawer">
  <div class="drawer-header">설정</div>
  <div class="item">알림 <span class="switch" data-key="notify"></span></div>
  <div class="item">진동 <span class="switch" data-key="vibrate"></span></div>
  <div class="sys">
    <div>제조사: Apple</div>
    <div>모델: iPhone</div>
    <div>OS: <span id="os"></span></div>
    <div>App: Demo 1.0</div>
  </div>
</aside>

<main>
  <section class="card info">
    <div>설치일시 : <span id="install"></span></div>
    <div>상태시각 : <span id="statusTime"></span></div>
  </section>

  <section class="card center">
    <div class="ring">
      <svg viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="52" class="bg"/>
        <circle cx="60" cy="60" r="52" class="fg" id="progress"/>
      </svg>
      <div id="timer">0일 00:00:00</div>
    </div>
  </section>

  <section class="card warn">
    이 화면은 교육/점검용 데모입니다. 실제 보안 기능은 동작하지 않습니다.
  </section>

  <section class="card logs">
    <div class="logs-header">
      <span>로그</span>
      <button id="addLog">추가</button>
    </div>
    <div id="logList"></div>
  </section>
</main>

<!-- 로그 편집 모달 -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>로그 편집</h3>
    <textarea id="logText"></textarea>
    <div class="modal-actions">
      <button id="saveLog">저장</button>
      <button id="cancelLog">취소</button>
      <button id="deleteLog" class="danger">삭제</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html
